<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allan CRM 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-badge" id="logo-badge">AW</div>
    <div class="logo-text">
      <div class="logo-title" id="sys-name">Allan CRM 2026</div>
      <div class="logo-sub" id="sys-company">ROC Wealth Advisory</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Main Menu</div>
    <button class="nav-item active" data-page="dashboard">
      <span class="nav-icon">🏠</span> Dashboard
    </button>
    <button class="nav-item" data-page="payments">
      <span class="nav-icon">💳</span> Payment Tracker
    </button>
    <button class="nav-item" data-page="claims">
      <span class="nav-icon">🏥</span> Claims
    </button>
    <button class="nav-item" data-page="servicing">
      <span class="nav-icon">🔧</span> Service Records
    </button>

    <div class="nav-section-label" style="margin-top:8px">System</div>
    <button class="nav-item" data-page="settings">
      <span class="nav-icon">⚙️</span> Settings & Help
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="connection-badge">
      <div class="connection-dot disconnected"></div>
      <span class="connection-text">Connecting...</span>
    </div>
    <div style="margin-top:6px;font-size:10px;color:var(--text-muted)">Allan CRM 2026 v1.0</div>
  </div>
</aside>

<div id="main-content">
  <!-- Offline Banner -->
  <div id="offline-banner">
    📶 You are offline — showing cached data. Changes cannot be saved until reconnected.
  </div>

  <!-- Top Bar -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-sub" id="page-subtitle">Overview & Reminders</div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm" onclick="App.refreshData()" title="Refresh">🔄 Refresh</button>
      <button class="btn btn-outline btn-sm" id="today-btn">
        📅 <span id="today-date"></span>
      </button>
    </div>
  </header>

  <div id="page-content">
    <div class="loading-overlay">
      <div class="spinner"></div>
      <span>Connecting to Google Sheets...</span>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="config.js"></script>
<script src="modules/api.js"></script>
<script src="modules/ui.js"></script>
<script src="modules/payments.js"></script>
<script src="modules/claims.js"></script>
<script src="modules/servicing.js"></script>
<script src="modules/dashboard.js"></script>
<script src="modules/settings.js"></script>
<script src="app.js"></script>

</body>
</html>
