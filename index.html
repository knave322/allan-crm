<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allan CRM 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     SIDEBAR
══════════════════════════════════════════════════════════ -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-badge" id="logo-badge">AW</div>
    <div class="logo-text">
      <div id="sys-name">Allan CRM</div>
      <div class="logo-sub" id="sys-company">ROC Wealth Advisory</div>
    </div>
  </div>

  <nav>
    <!-- 主菜单 -->
    <div class="nav-section">
      <div class="nav-label">主菜单</div>
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-icon">🏠</span> 仪表板
      </div>
      <div class="nav-item" data-page="payments">
        <span class="nav-icon">💳</span> 付款跟踪
        <span class="nav-badge hidden" id="badge-payments">0</span>
      </div>
      <div class="nav-item" data-page="claims">
        <span class="nav-icon">🏥</span> 理赔管理
        <span class="nav-badge hidden" id="badge-claims">0</span>
      </div>
      <div class="nav-item" data-page="servicing">
        <span class="nav-icon">🔧</span> 服务记录
      </div>
    </div>

    <!-- 设置 -->
    <div class="nav-section">
      <div class="nav-label">系统</div>
      <div class="nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span> 设置 & 帮助
      </div>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div id="conn-indicator" class="conn-status conn-err">
      <div class="conn-dot"></div>
      <span>未连接</span>
    </div>
    <div style="margin-top:6px; font-size:10px;">Allan CRM 2026 v1.0</div>
  </div>
</aside>

<!-- ══════════════════════════════════════════════════════════
     MAIN AREA
══════════════════════════════════════════════════════════ -->
<div id="main">
  <!-- Top Bar -->
  <header id="topbar">
    <button class="menu-toggle" onclick="App.toggleSidebar()">☰</button>
    <div>
      <div class="topbar-title" id="page-title">仪表板</div>
      <div class="topbar-subtitle" id="page-subtitle">概览 & 待办提醒</div>
    </div>
    <div class="topbar-actions">
      <div class="btn-icon" title="刷新数据" onclick="App.refreshData()">🔄</div>
      <div class="btn-icon" title="导出 CSV" onclick="App.exportCSV()">📥</div>
      <div class="btn-icon" title="当前日期">
        📅 <span id="today-date" style="font-size:11px;margin-left:2px;"></span>
      </div>
    </div>
  </header>

  <!-- Page Content (动态渲染) -->
  <div id="page-content">
    <div class="loading-overlay">
      <div class="spinner"></div>
      <span>正在连接 Google Sheets...</span>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     MODAL (全局，模块共用)
══════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="Modal.closeOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">标题</div>
      <div class="modal-close" onclick="Modal.close()">✕</div>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast 通知容器 -->
<div id="toast-container"></div>

<!-- ══════════════════════════════════════════════════════════
     SCRIPTS (顺序重要!)
══════════════════════════════════════════════════════════ -->
<script src="config.js"></script>
<script src="modules/api.js"></script>
<script src="modules/ui.js"></script>
<script src="modules/payments.js"></script>
<script src="modules/claims.js"></script>
<script src="modules/servicing.js"></script>
<script src="modules/dashboard.js"></script>
<script src="modules/settings.js"></script>
<script src="app.js"></script>

</body>
</html>
